name: Deploy Observability Stack

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Validate Configs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose syntax
        run: |
          docker compose -f docker-compose.yml config --quiet
          echo "✅ docker-compose.yml is valid"

      - name: Check required files
        run: |
          for file in docker-compose.yml prometheus/prometheus.yml; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing required file: $file"
              exit 1
            fi
          done
          echo "✅ All required files present"

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Copy files to VPS
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/observability-stack/

      - name: Deploy stack
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            cd ~/observability-stack
            docker compose pull
            docker compose up -d --remove-orphans
            echo "✅ Stack deployed"
          EOF

      - name: Healthcheck
        run: |
          echo "⏳ Waiting for services to stabilize..."
          sleep 15
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            echo "--- Container status ---"
            docker compose -f ~/observability-stack/docker-compose.yml ps

            # Check Prometheus
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:9090/-/healthy)
            if [ "$STATUS" != "200" ]; then
              echo "❌ Prometheus healthcheck failed (HTTP $STATUS)"
              exit 1
            fi
            echo "✅ Prometheus healthy"

            # Check Grafana
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/health)
            if [ "$STATUS" != "200" ]; then
              echo "❌ Grafana healthcheck failed (HTTP $STATUS)"
              exit 1
            fi
            echo "✅ Grafana healthy"
          EOF

      - name: Notify success
        if: success()
        run: echo "🚀 Deploy completed successfully at $(date)"

      - name: Notify failure
        if: failure()
        run: echo "💥 Deploy failed — check logs above"name: Deploy Observability Stack

