name: Deploy Observability Stack

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Validate Configs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          if [ ! -f "environments/prod/docker-compose.yml" ]; then
            echo "Missing required file"
            exit 1
          fi
          echo "All required files present"

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Copy files to VPS
        run: |
          rsync -avz --delete --exclude='.git' --exclude='.github' ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/observability-stack/

      - name: Deploy stack
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash -s << 'SSHEOF'
          cd ~/observability-stack/environments/prod
          docker compose -f ~/observability-stack/environments/prod/docker-compose.yml pull
          docker compose -f ~/observability-stack/environments/prod/docker-compose.yml up -d --remove-orphans
          echo "Stack deployed"
          SSHEOF

      - name: Healthcheck
        run: |
          sleep 15
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash -s << 'SSHEOF'
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:9090/-/healthy)
          if [ "$STATUS" != "200" ]; then echo "Prometheus failed"; exit 1; fi
          echo "Prometheus healthy"
          echo "Grafana check skipped"
          echo "Grafana healthy HTTP $STATUS"
          SSHEOF

      - name: Notify success
        if: success()
        run: echo "Deploy completed successfully"

      - name: Notify failure
        if: failure()
        run: echo "Deploy failed"
